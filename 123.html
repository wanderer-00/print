<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
</head>

<style>
    svg {
        height: 24px;
        aspect-ratio: 1;
        stroke: black;
    }
    
    #cluster {
        width: 400px;
        display: grid;
        grid-gap: 1rem;
        grid-template-columns: auto auto 1fr auto 1fr;
    }
    
    .price {
        border: 1px solid black;
    }
    </style>

<body>
    <div id="cluster"></div>
</body>

<svg style="display: none">
    <symbol id="mns" viewBox="0 0 24 24">
        <line x1="5" y1="12" x2="19" y2="12"></line>
    </symbol>
    <symbol id="pls" viewBox="0 0 24 24">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
    </symbol>
</svg>

<script>
    // что вставлять
    const d = [
        {
            "en": "tshirt",
            "ru": "Футболка",
            "count": 100,
            "price": 500
        },

        {
            "en": "hoodie",
            "ru": "Худи",
            "count": 100,
            "price": 500
        },

        {
            "en": "umbrella",
            "ru": "Зонт",
            "count": 100,
            "price": 500
        },

        {
            "en": "cap",
            "ru": "Кепка",
            "count": 100,
            "price": 500
        },

        {
            "en": "shopper",
            "ru": "Шоппер",
            "count": 100,
            "price": 500
        }
    ];

    // куда вставлять
    const cluster = document.getElementById('cluster');

    // как вставлять
    for (i = 0; i < d.length; i++) {
        cluster.innerHTML += `
        <button class="btn" data-model="${d[i].en}">${d[i].ru}</button>
        <button class="count"><svg><use xlink:href="#mns"></use></svg></button>
        <input class="count" id="" type="number" placeholder="кол-во" min="0" max="5000" value="0">
        <button class="count"><svg><use xlink:href="#pls"></use></svg></button>
        <div class="price" id="price"></div>
    `
    };
    
    
</script></html>
