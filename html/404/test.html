<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Страница не найдена</title>
    <style>
        /* Основные стили страницы */
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: red;
            font-family: sans-serif;
        }

        #not-found-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        h1 {
            font-size: 15vw;
            margin: 0;
            color: black;
            z-index: 2;
            /* Текст будет между слоями 1 и 3 */
            pointer-events: none;
            user-select: none;
        }

        /* Общие стили для человечков */
        .human {
            position: absolute;
            top: -1000px;
            will-change: top, transform;
            animation: fall linear forwards;
        }

        .human svg {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Слои (Параллакс и глубина) */
        .layer-back {
            z-index: 1;
            filter: blur(2px) grayscale(0.5);
        }

        .layer-mid {
            z-index: 2;
        }

        .layer-front {
            z-index: 3;
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.2));
        }

        /* Анимация падения с вращением */
        @keyframes fall {
            from {
                top: -1000px;
                transform: scaleX(var(--scale)) rotate(var(--start-rot));
            }

            to {
                top: 110vh;
                transform: scaleX(var(--scale)) rotate(var(--end-rot));
            }
        }
    </style>
</head>

        <h1>404</h1>
    </div>

            </svg>`
        ];

        function createHuman() {
            const div = document.createElement('div');

            // Случайный слой (0, 1 или 2)
            const layerIndex = Math.floor(Math.random() * 3);
            const layers = ['layer-back', 'layer-mid', 'layer-front'];
            div.className = `human ${layers[layerIndex]}`;

            // Рандомный выбор одного из двух SVG
            div.innerHTML = svgTemplates[Math.floor(Math.random() * svgTemplates.length)];

            // Настройки в зависимости от слоя
            let size, duration, opacity;
            if (layerIndex === 0) { // Дальний
                size = Math.random() * 20 + 30; // 30-50px
                duration = Math.random() * 60 + 10; // 10-16 сек
                opacity = 0.4;
            } else if (layerIndex === 1) { // Средний
                size = Math.random() * 30 + 60; // 60-90px
                duration = Math.random() * 4 + 6; // 6-10 сек
                opacity = 0.8;
            } else { // Передний
                size = Math.random() * 400 + 100; // 100-150px
                duration = Math.random() + 1; // 4-6 сек
                opacity = 1;
            }

            const left = Math.random() * 100;
            const scaleX = Math.random() > 0.5 ? 1 : -1;
            const startRotation = Math.random() * 360;
            const endRotation = startRotation + (Math.random() * 720 - 360);

            // Применяем стили через CSS-переменные
            Object.assign(div.style, {
                left: `${left}%`,
                width: `${size}px`,
                opacity: opacity,
                animationDuration: `${duration}s`,
                animationDelay: `${Math.random() * 2}s`, // случайная задержка старта
                '--scale': scaleX,
                '--start-rot': `${startRotation}deg`,
                '--end-rot': `${endRotation}deg`
            });

            container.appendChild(div);

            // Удаление элемента после пролета
            div.addEventListener('animationend', () => {
                div.remove();
            });
        }

        // Создаем начальную партию
        for (let i = 0; i < 100; i++) {
            createHuman();
        }

        // Бесконечный поток
        setInterval(createHuman, 50);
    </script>
