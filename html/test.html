<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Test calc</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<style>
    #cluster {
        display: grid;
        grid-template-columns: 1fr 1fr;
        background-color: blue;
    }

    #calc {
        display: grid;
        grid-gap: 1rem;
        grid-template-columns: auto auto 1fr auto 1fr;
        background-color: red;
    }

    model-viewer {
        width: 100%;
        height: 100%;
        background-color: yellow;
    }

    #calc svg {
        height: 24px;
        aspect-ratio: 1;
        stroke: black;
        stroke-width: 2px;
    }

    #calc .price {
        border: 1px solid black;
    }

    @media (orientation:portrait){
        #cluster {
            display: grid;
            grid-template-rows: 1fr auto;
            grid-template-columns: 1fr;
        }

        model-viewer {
            aspect-ratio:1;
        }
    }
</style>

<body>
    <div id="cluster">

        <!-- калькулятор -->
        <div id="calc"></div>
        
        <div id="check">Итог: 0 &#8381;</div>

        <!-- 3D -->
        <script type="module" src="../script/model-viewer.min.js"></script>
        <model-viewer
            id="wireframe-demo"
            src="../3d/tshirt.glb"
            camera-controls
            disable-zoom
        ></model-viewer>

    </div>
</body>

<svg style="display: none">
    <symbol id="mns" viewBox="0 0 24 24">
        <line x1="5" y1="12" x2="19" y2="12"></line>
    </symbol>
    <symbol id="pls" viewBox="0 0 24 24">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
    </symbol>
</svg>

<script src="../script/calc.js"></script></html>
