<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Martian Radar Clone</title>
    <style>
        body {
            margin: 0;
            background: #0b0e14; /* Темный фон в стиле Evil Martians */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: #ff5a5f;
            font-family: sans-serif;
        }
        canvas {
            border: 1px solid #1a1f29;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255, 90, 95, 0.1);
        }
    </style>
</head>
<body>

    <canvas id="radar"></canvas>

<script>
    const canvas = document.getElementById('radar');
    const ctx = canvas.getContext('2d');

    // Настройки
    const size = 400;
    canvas.width = size;
    canvas.height = size;
    const centerX = size / 2;
    const centerY = size / 2;
    const radius = size / 2 - 10;

    let angle = 0;
    const targets = [];

    // Создаем случайные "цели"
    for(let i = 0; i < 5; i++) {
        targets.push({
            x: centerX + (Math.random() - 0.5) * radius * 1.5,
            y: centerY + (Math.random() - 0.5) * radius * 1.5,
            opacity: 0,
            dist: 0
        });
    }

    function drawRadar() {
        ctx.clearRect(0, 0, size, size);

        // 1. Сетка (круги)
        ctx.strokeStyle = 'rgba(255, 90, 95, 0.2)';
        ctx.lineWidth = 1;
        for(let i = 1; i <= 3; i++) {
            ctx.beginPath();
            ctx.arc(centerX, centerY, (radius / 3) * i, 0, Math.PI * 2);
            ctx.stroke();
        }

        // 2. Отрисовка целей
        targets.forEach(target => {
            // Проверяем, пересекается ли луч с целью (упрощенно по углу)
            const targetAngle = Math.atan2(target.y - centerY, target.x - centerX);
            const normalizedAngle = (angle % (Math.PI * 2));
            const diff = Math.abs(normalizedAngle - (targetAngle + Math.PI)); 
            
            // Если луч проходит над точкой, "зажигаем" её
            if (diff < 0.1) target.opacity = 1;
            
            if (target.opacity > 0) {
                ctx.fillStyle = `rgba(255, 90, 95, ${target.opacity})`;
                ctx.beginPath();
                ctx.arc(target.x, target.y, 4, 0, Math.PI * 2);
                ctx.fill();
                target.opacity -= 0.01; // Постепенное затухание
            }
        });

        // 3. Вращающийся луч (градиент)
        const gradient = ctx.createConicGradient(angle, centerX, centerY);
        gradient.addColorStop(0, 'rgba(255, 90, 95, 0.5)');
        gradient.addColorStop(0.1, 'rgba(255, 90, 95, 0)');
        gradient.addColorStop(1, 'rgba(255, 90, 95, 0)');

        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.arc(centerX, centerY, radius, angle, angle + 0.5);
        ctx.closePath();
        ctx.fill();

        // 4. Линия луча
        ctx.strokeStyle = '#ff5a5f';
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.lineTo(
            centerX + Math.cos(angle) * radius,
            centerY + Math.sin(angle) * radius
        );
        ctx.stroke();

        angle += 0.03;
        requestAnimationFrame(drawRadar);
    }

    drawRadar();
</script>
</body>
</html>
