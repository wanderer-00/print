<!DOCTYPE html>
<html lang="en">
<head>
    <!-- кодировка сайта -->
    <meta charset="UTF-8">
    <!-- -300ms к загрузке сайта -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- метаописание -->
    <meta name="description" content="Купить футболки кепки шоперы зонты и худи с принтом в Казани оптом">
    <!--  -->
    <meta name="author" content="casper sync">
    <title>Тестовый полигон</title>

    <!-- обнуление стандартных стилей button -->
    <link rel="stylesheet" href="css/reset-button.css">
    <!-- обнуление стандартных стилей input[type=color] -->
    <link rel="stylesheet" href="css/reset-input-color.css">
    <!-- обнуление стандартных стилей input[type=range] -->
    <link rel="stylesheet" href="css/reset-input-range.css">
    <!-- основные стили -->
    <link rel="stylesheet" href="css/style.css">
    <!-- FPS, вершины, полигоны -->
    <link rel="stylesheet" href="css/static-info.css">
</head>

<body>
    <header>
        <h1>BenchMark Model-viewer</h1>
    </header>

    <main>

        <!-- скрипт -->
        <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>

        <model-viewer
            id="wireframe-demo"
            src="../../3d/hoodie1.glb"
            camera-controls
            min-camera-orbit="auto 20deg 25m"
            max-camera-orbit="auto 160deg 40m"
            touch-action="pan-y"
            lighting-color="#FFFFFF"
            intensity="1"
            alt="Описание 3D модели"
            >

            <div id="static-info">

                <div id="fps" title="Количество кадро в секунду">
                    FPS <b>?</b>
                </div>

                <div id="triangle" title="Количество полигонов в 3D модели">
                    &#9651; <b>?</b>
                </div>

                <div id="vertex" title="Количество вершин в 3D модели">
                    &otimes; <b>?</b>
                </div>

            </div>
        </model-viewer>

        <div id="statistics">

            <!-- Изменение основного цвета материала. [red, green, blue, alpha] (каждое значение может быть от 0 до 1) (alpha - прозрачность) -->
            <div id="baseColor"></div>

            <!-- baseColor -->
            <div class="controls" id="color-set">
                <!-- Список предустановленных цветов -->
                <div id="palette">
                    <button onclick="colorSet(hexToRgb('#FFFFFF'))" style="background-color: #FFFFFF" title="Белый"></button>
                    <button onclick="colorSet(hexToRgb('#000000'))" style="background-color: #000000" title="Чёрный"></button>
                    <button onclick="colorSet(hexToRgb('#c1a07b'))" style="background-color: #c1a07b" title="Бежевый"></button>
                    <button onclick="colorSet(hexToRgb('#1e7640'))" style="background-color: #1e7640" title="Мятный"></button>
                    <button onclick="colorSet(hexToRgb('#904c4c'))" style="background-color: #904c4c" title="Розовый"></button>
                    <!-- кастомный цвет -->
                    <input type="color" id="color-picker" value="#FFFFFF" title="Выбрать свой цвет">
                </div>
            </div>
            
            <div id="camera-orbit">
                <lable for="theta" id="l-theta">X = XXX&deg;</lable>
                <input type="range" id="theta" min="0" max="360" step="1">
                
                <lable for="phi" id="l-phi">Y = YYY&deg;</lable>
                <input type="range" id="phi" min="0" max="180" step="1">
                
                <lable for="radius" id="l-radius">22.00m</lable>
                <input type="range" id="radius" min="22" max="43">
            </div>

            <!-- Степень «металличности» поверхности (диапазон от 0 до 1) -->
            <div id="metallic" class="control">
                <label for="metallic-range">Металличность</label>
                <div id="metallic_value">0.0</div>
                <input type="range" id="metallic-range" min="0" max="1" step="0.1" value="0">
            </div>

            <!-- Шероховатость: Насколько поверхность матовая или глянцевая [0 зеркальная, 1 матовая] -->
            <div id="roughness" class="control">
                <label for="roughness-range">Шерховатость</label>
                <div id="roughness_value">1.0</div>
                <input type="range" id="roughness-range" min="0" max="1" step="0.1" value="1">
            </div>

            <!--  -->
            <div id="colors">
                <button onclick="setColor([1,0,0,1])">Frame</button>
            </div>
            
            <div id="uv-map"></div>
        </div>

    </main>

    <footer>
        <p>v 25.04.2026</p>
    </footer>

</body>

<!-- FPS -->
<script src="script/fps.js"></script>

<!-- вывод списка материалов модели -->
<script src="script/materialList.js"></script>

<!-- управление материалами -->
<script src="script/material.js"></script>

<!-- metallic -->
<script src="script/metallic.js"></script>

<!-- baseColor -->
<script src="script/baseColor.js"></script>

<!-- camera-orbit -->
<script src="script/camera-orbit.js"></script>

<!-- вес файла -->
<!--<script src="script/size.js"></script>-->
</html>
