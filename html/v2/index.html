<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Текстильная типография</title>

    <!-- С Т И Л И -->
    <!-- сброс стандартных стилей элементов -->
    <link rel="stylesheet" href="css/reset.css">
    <!-- главные стили -->
    <link rel="stylesheet" href="css/root.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/main.css">
		<link rel="stylesheet" href="css/poster.css">
        <link rel="stylesheet" href="css/calc.css">
    <link rel="stylesheet" href="css/aside.css">
    <link rel="stylesheet" href="css/footer.css">
</head>
<body>
    <header>
		<div id="logo"></div>
        <ul>
            <li><a href="#calc">Расчёт стоимости</a></li>
            <li><a href="#">Редактор дизайна</a></li>
            <li><a href="#">Связаться с нами</a></li>
        </ul>
    </header>

    <main>
        <!-- постер-видеоо -->
        <div id="poster">
            <svg><use xlink:href="#poster"></use></svg>
        </div>

        <!-- калькулятор -->
        <div id="calc">

            <h2>Расчёт стоимости</h2>
            <div id="cluster" class="place">

                <!-- калькулятор -->
                <div id="display">
                    <div id="buttons">
                        <button><svg><use xlink:href="#tshirt"></use></svg></button>
                        <button><svg><use xlink:href="#hoodie"></use></svg></button>
                        <button><svg><use xlink:href="#cap"></use></svg></button>
                        <button><svg><use xlink:href="#shopper"></use></svg></button>
                        <button><svg><use xlink:href="#umbrella"></use></svg></button>
                    </div>
                    
                    <div id="sizes">
                        <button>S</button>
                        <button>M</button>
                        <button>L</button>
                    </div>
                    
                    <div id="count">
                        <button>-</button>
                        <input type="number">
                        <button>+</button>
                    </div>
                </div>

                <!-- 3D просмотр -->
                <script type="module" src="../../script/model-viewer.min.js"></script>
                <model-viewer
                    id="wireframe-demo"
                    src="../../3d/hoodie1.glb"
                    camera-controls
                ></model-viewer>
                
                <!-- стоимость -->
				<div id="check">
					<table id="table"></table>
				</div>
            </div>
        </div>
        
        <!-- галерея -->
        <div id="gallery"></div>
        
        <!-- наши клиенты -->
        <div id="clients"></div>
        
        <!-- вопрос / ответ -->
        <div id="question"></div>
    </main>

	<aside id="aside">
        <a href="#">
            <svg><use xlink:href="#vk"></use></svg>
        </a>

        <a href="#">
            <svg><use xlink:href="#tg"></use></svg>
        </a>

        <a href="#">
            <svg><use xlink:href="#pin"></use></svg>
        </a>
    </aside>

    <footer id="footer"></footer>
</body>
