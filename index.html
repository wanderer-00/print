<body>
    <header class="no-select">
        <a href="index.html" aria-label="На главную страницу">
            <svg>
                <use xlink:href="#logo"></use>
            </svg>
        </a>

        <nav>
            <a href="tel:+79872972282">+7(987)297-22-82</a>
            <a href="#">Портфолио</a>
        </nav>
    </header>

    <main>
        <div id="poster">
            <h1>Заменить на видео таймлапс</h1>
        </div>

        <div id="calc_3d">
            <!-- калькулятор -->
            <div id="calc">
                <div>
                    <button class="count btn" onclick="minus()">-</button>
                    <input class="count" id="count" type="number" placeholder="кол-во" min="1" value="1">
                    <button class="count btn" onclick="plus()">+</button>
                </div>

                <div id="btn_cluster">
                    <button class="model-btn btn" data-model="3d/tshirt.glb">Футболка</button>

                    <button class="model-btn btn" data-model="3d/cap.glb">Кепка</button>

                    <button class="model-btn btn" data-model="3d/umbrella.glb">Зонт</button>

                    <button class="model-btn btn" data-model="3d/hoodie.glb">Худи</button>
                </div>

                <div id="price"></div>
            </div>

            <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>
            <model-viewer src="3d/tshirt.glb" environment-image="" shadow-intensity="1" camera-orbit="100deg 90deg" camera-controls touch-action="pan-y" disable-zoom></model-viewer>

            <!-- переключение 3D моделей в калькуляторе -->
            <script src="script/model.js"></script>
        </div>

        <div id="dizziness">
            <div id="task"></div>
            <h1>Нагрузка на производство - малая</h1>
            <hr>
            <div>
                <p>Наша текущая загруженность</p>
                <h1>71%</h1>
                <h1>Период - 1 Неделя</h1>
                <div id="display"></div>
            </div>
        </div>

        <!-- slider -->
        <div id="galery">

        </div>

        <!-- наши клиенты -->
        <h2>Наши клиенты</h2>
        <div id="clients">
            <div id="wrapper-slider-logo">
                <div class="resizable" data-translate="items" data-direction="horizontal" data-blurring="true" data-outline="false" data-play-state="running" data-spill="false" style="--speed: 60; --count: 20; --scale: 1; --blur: 1; --blurs: 8;">
