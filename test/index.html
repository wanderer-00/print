<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Тестовый полигон</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div id="statistics">
            <div id="fps">FPS - 00</div>
            <div id="vertex"></div>
            <div id="triangle"></div>
            <div id="material"></div>
            <div id="baseColor"></div>
            <div id="metallic"></div>
            <div id="opacity"></div>
            <div id="roughness"></div>
            <div id="normalMap"></div>
            <div id="emission"></div>
        </div>
    </header>
    <main>
        <!-- скрипт -->
        <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>
        
        <model-viewer
        src="../3d/tshirt.glb"
        environment-image=""
        shadow-intensity="1"
        camera-orbit="100deg 90deg"
        camera-controls
        touch-action="pan-y"
        disable-zoom
        ></model-viewer>

        <div class="controls">

            <!-- metallic -->
            <label for="metallic-range">Металличность:</label>
            <input type="range" id="metallic-range" min="0" max="1" step="0.01" value="0">
            
            <!-- baseColor -->
            <label for="color-picker">Цвет модели:</label>
            <input type="color" id="color-picker" value="#ffffff">
        </div>

    </main>
    <footer></footer>
</body>

<!-- FPS -->
<script src="script/fps.js"></script>

<!-- список материалов -->
<script src="script/material.js"></script>

<!-- metallic -->
<script src="script/metallic.js"></script>

<!-- baseColor -->
<script src="script/baseColor.js"></script>

</html>
